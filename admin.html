<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - 0banai Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        body { background-color: #222; color: #eee; padding: 20px; }
        .container { max-width: 900px; }
        h1, h2 { color: #6ed0e0; }
        #login-form { max-width: 330px; margin: auto; }
        #admin-content { display: none; }
        .table { background-color: #333; }
        .table th, .table td { border-color: #444; }
        .form-control { background-color: #444; border-color: #555; color: #eee; }
        .btn-primary { background-color: #6ed0e0; border-color: #6ed0e0; color: #222; }
        .btn-danger { background-color: #d9534f; border-color: #d43f3a; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Administration</h1>

        <form id="login-form">
            <h2>Login</h2>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div id="admin-content">
            <h2>Product Management</h2>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="products-list">
                    <!-- Products will be loaded here -->
                </tbody>
            </table>

            <hr>

            <h2>Add New Product</h2>
            <form id="add-product-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                 <div class="form-group">
                    <label for="price">Price</label>
                    <input type="number" class="form-control" id="price" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="image">Image Path</label>
                    <input type="text" class="form-control" id="image" placeholder="img/image.png" required>
                </div>
                <div class="form-group">
                    <label for="video">Video Path</label>
                    <input type="text" class="form-control" id="video" placeholder="video.mp4" required>
                </div>
                <button type="submit" class="btn btn-primary">Add Product</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const adminContent = document.getElementById('admin-content');
            const correctPassword = "admin";

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                if (password === correctPassword) {
                    loginForm.style.display = 'none';
                    adminContent.style.display = 'block';
                    loadProducts();
                } else {
                    alert('Incorrect password!');
                }
            });

            const productsList = document.getElementById('products-list');
            const addProductForm = document.getElementById('add-product-form');

            async function loadProducts() {
                try {
                    const response = await fetch('/api/products');
                    const products = await response.json();

                    productsList.innerHTML = '';
                    products.forEach(product => {
                        const row = `
                            <tr>
                                <td>${product.id}</td>
                                <td>${product.name}</td>
                                <td>${product.price} €</td>
                                <td><button class="btn btn-danger btn-sm" onclick="deleteProduct(${product.id})">Delete</button></td>
                            </tr>
                        `;
                        productsList.innerHTML += row;
                    });
                } catch (error) {
                    console.error('Error loading products:', error);
                }
            }

            window.deleteProduct = async function(id) {
                if (!confirm('Are you sure you want to delete this product?')) return;

                try {
                    const response = await fetch(`/api/products/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': correctPassword }
                    });
                    if (response.ok) {
                        const result = await response.json();
                        alert(result.message);
                        loadProducts();
                    } else {
                        const result = await response.json();
                        alert('Error: ' + result.error);
                    }
                } catch (error) {
                    console.error('Error deleting product:', error);
                }
            }

            addProductForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const timestamp = Date.now();
                const newProduct = {
                    name: document.getElementById('name').value,
                    price: parseFloat(document.getElementById('price').value),
                    image: document.getElementById('image').value,
                    video: document.getElementById('video').value,
                    modal_id: 'product-modal-' + timestamp,
                    video_preview_id: 'videoPreview-' + timestamp
                };

                try {
                    const response = await fetch('/api/products', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': correctPassword
                        },
                        body: JSON.stringify(newProduct)
                    });

                    if (response.ok) {
                        const result = await response.json();
                        alert(result.message);
                        addProductForm.reset();
                        loadProducts();
                    } else {
                        const result = await response.json();
                        alert('Error: ' + result.error);
                    }
                } catch (error) {
                    console.error('Error adding product:', error);
                }
            });
        });
    </script>

</body>
</html>
