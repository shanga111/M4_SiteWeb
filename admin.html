<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Administration - Portfolio ERACOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        body { background-color: #222; color: #eee; padding: 20px; }
        .container { max-width: 900px; }
        h1, h2 { color: #6ed0e0; }
        #login-form { max-width: 330px; margin: auto; }
        #admin-content { display: none; }
        .table { background-color: #333; }
        .table th, .table td { border-color: #444; }
        .form-control { background-color: #444; border-color: #555; color: #eee; }
        .btn-primary { background-color: #6ed0e0; border-color: #6ed0e0; color: #222; }
        .btn-danger { background-color: #d9534f; border-color: #d43f3a; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Panneau d'Administration</h1>

        <form id="login-form">
            <h2>Connexion</h2>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>

        <div id="admin-content">
            <h2>Gestion des Projets</h2>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Image (Facultatif)</th>
                        <th>Vidéo</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="products-list">
                    <!-- Les projets seront chargés ici -->
                </tbody>
            </table>

            <hr>

            <h2 id="form-title">Ajouter un nouveau projet</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="form-group">
                    <label for="name">Nom du projet</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="form-group">
                    <label for="image">Chemin de l'image (poster - facultatif)</label>
                    <input type="text" class="form-control" id="image" placeholder="img/nom.png">
                </div>
                <div class="form-group">
                    <label for="video">Chemin de la vidéo</label>
                    <input type="text" class="form-control" id="video" placeholder="video/nom.mp4" required>
                </div>
                <div class="form-group">
                    <label for="is_wide">Format large (16:9) ?</label>
                    <select class="form-control" id="is_wide">
                        <option value="0">Non (1:1 / Square)</option>
                        <option value="1">Oui (16:9)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comments">Commentaires / Notes techniques</label>
                    <textarea class="form-control" id="comments" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="submit-button">Ajouter le projet</button>
                <button type="button" class="btn btn-secondary" id="cancel-button" style="display: none;">Annuler</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const adminContent = document.getElementById('admin-content');
            const correctPassword = "admin";

            let productsCache = [];

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                if (password === correctPassword) {
                    loginForm.style.display = 'none';
                    adminContent.style.display = 'block';
                    loadProducts();
                } else {
                    alert('Mot de passe incorrect !');
                }
            });

            const productsList = document.getElementById('products-list');
            const productForm = document.getElementById('product-form');
            const formTitle = document.getElementById('form-title');
            const submitButton = document.getElementById('submit-button');
            const cancelButton = document.getElementById('cancel-button');

            async function loadProducts() {
                try {
                    const response = await fetch('/api/products');
                    productsCache = await response.json();
                    renderProducts();
                } catch (error) {
                    console.error('Error loading products:', error);
                }
            }

            function renderProducts() {
                productsList.innerHTML = '';
                productsCache.forEach(product => {
                    const row = `
                        <tr>
                            <td>${product.id}</td>
                            <td>${product.name}</td>
                            <td>${product.image}</td>
                            <td>${product.video}</td>
                            <td>
                                <button class="btn btn-primary btn-sm" onclick="editProduct(${product.id})">Modifier</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${product.id})">Supprimer</button>
                            </td>
                        </tr>
                    `;
                    productsList.innerHTML += row;
                });
            }

            window.editProduct = function(id) {
                const product = productsCache.find(p => p.id === id);
                if (!product) return;

                document.getElementById('product-id').value = product.id;
                document.getElementById('name').value = product.name;
                document.getElementById('image').value = product.image;
                document.getElementById('video').value = product.video;
                document.getElementById('is_wide').value = product.is_wide;
                document.getElementById('comments').value = product.comments || '';

                formTitle.textContent = 'Modifier le projet';
                submitButton.textContent = 'Enregistrer les modifications';
                cancelButton.style.display = 'inline-block';
            }

            window.deleteProduct = async function(id) {
                if (!confirm('Êtes-vous sûr de vouloir supprimer ce projet ?')) return;

                try {
                    const response = await fetch(`/api/products/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': correctPassword }
                    });
                    const result = await response.json();
                    alert(result.message || result.error);
                    if (response.ok) loadProducts();
                } catch (error) {
                    console.error('Erreur lors de la suppression :', error);
                }
            }

            cancelButton.addEventListener('click', () => {
                resetForm();
            });

            function resetForm() {
                productForm.reset();
                document.getElementById('product-id').value = '';
                formTitle.textContent = 'Ajouter un nouveau projet';
                submitButton.textContent = 'Ajouter le projet';
                cancelButton.style.display = 'none';
            }

            productForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const id = document.getElementById('product-id').value;
                const productData = {
                    name: document.getElementById('name').value,
                    image: document.getElementById('image').value,
                    video: document.getElementById('video').value,
                    is_wide: parseInt(document.getElementById('is_wide').value),
                    comments: document.getElementById('comments').value
                };

                const isEditing = !!id;
                const url = isEditing ? `/api/products/${id}` : '/api/products';
                const method = isEditing ? 'PUT' : 'POST';

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': correctPassword
                        },
                        body: JSON.stringify(productData)
                    });

                    const result = await response.json();
                    alert(result.message || result.error);

                    if (response.ok) {
                        resetForm();
                        loadProducts();
                    }
                } catch (error) {
                    console.error('Error submitting form:', error);
                }
            });
        });
    </script>

</body>
</html>
