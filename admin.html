<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - 0banai Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        body { background-color: #222; color: #eee; padding: 20px; }
        .container { max-width: 900px; }
        h1, h2 { color: #6ed0e0; }
        #login-form { max-width: 330px; margin: auto; }
        #admin-content { display: none; }
        .table { background-color: #333; }
        .table th, .table td { border-color: #444; }
        .form-control { background-color: #444; border-color: #555; color: #eee; }
        .btn-primary { background-color: #6ed0e0; border-color: #6ed0e0; color: #222; }
        .btn-danger { background-color: #d9534f; border-color: #d43f3a; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Administration</h1>

        <form id="login-form">
            <h2>Login</h2>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div id="admin-content">
            <h2>Product Management</h2>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Image</th>
                        <th>Video</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="products-list">
                    <!-- Products will be loaded here -->
                </tbody>
            </table>

            <hr>

            <h2 id="form-title">Add New Product</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                 <div class="form-group">
                    <label for="price">Price</label>
                    <input type="number" class="form-control" id="price" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="image">Image Path</label>
                    <input type="text" class="form-control" id="image" placeholder="img/image.name.png" required>
                </div>
                <div class="form-group">
                    <label for="video">Video Path</label>
                    <input type="text" class="form-control" id="video" placeholder="Video/video.name.mp4" required>
                </div>
                <button type="submit" class="btn btn-primary" id="submit-button">Add Product</button>
                <button type="button" class="btn btn-secondary" id="cancel-button" style="display: none;">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const adminContent = document.getElementById('admin-content');
            const correctPassword = "admin";

            let productsCache = [];

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                if (password === correctPassword) {
                    loginForm.style.display = 'none';
                    adminContent.style.display = 'block';
                    loadProducts();
                } else {
                    alert('Mot de passe incorrect!');
                }
            });

            const productsList = document.getElementById('products-list');
            const productForm = document.getElementById('product-form');
            const formTitle = document.getElementById('form-title');
            const submitButton = document.getElementById('submit-button');
            const cancelButton = document.getElementById('cancel-button');

            async function loadProducts() {
                try {
                    const response = await fetch('/api/products');
                    productsCache = await response.json();
                    renderProducts();
                } catch (error) {
                    console.error('Erreur lors du chargement des produits:', error);
                }
            }

            function renderProducts() {
                productsList.innerHTML = '';
                productsCache.forEach(product => {
                    const row = `
                        <tr>
                            <td>${product.id}</td>
                            <td>${product.name}</td>
                            <td>${product.price} €</td>
                            <td>${product.image}</td>
                            <td>${product.video}</td>
                            <td>
                                <button class="btn btn-primary btn-sm" onclick="editProduct(${product.id})">Modifier</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${product.id})">Supprimer</button>
                            </td>
                        </tr>
                    `;
                    productsList.innerHTML += row;
                });
            }

            window.editProduct = function(id) {
                const product = productsCache.find(p => p.id === id);
                if (!product) return;

                document.getElementById('product-id').value = product.id;
                document.getElementById('name').value = product.name;
                document.getElementById('price').value = product.price;
                document.getElementById('image').value = product.image;
                document.getElementById('video').value = product.video;

                formTitle.textContent = 'Modifier le Produit';
                submitButton.textContent = 'Enregistrer les modifications';
                cancelButton.style.display = 'inline-block';
            }

            window.deleteProduct = async function(id) {
                if (!confirm('Êtes-vous sûr de vouloir supprimer ce produit?')) return;

                try {
                    const response = await fetch(`/api/products/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': correctPassword }
                    });
                    const result = await response.json();
                    alert(result.message || result.error);
                    if (response.ok) loadProducts();
                } catch (error) {
                    console.error('Erreur lors de la suppression du produit:', error);
                }
            }

            cancelButton.addEventListener('click', () => {
                resetForm();
            });

            function resetForm() {
                productForm.reset();
                document.getElementById('product-id').value = '';
                formTitle.textContent = 'Ajouter un Nouveau Produit';
                submitButton.textContent = 'Ajouter le Produit';
                cancelButton.style.display = 'none';
            }

            productForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const id = document.getElementById('product-id').value;
                const productData = {
                    name: document.getElementById('name').value,
                    price: parseFloat(document.getElementById('price').value),
                    image: document.getElementById('image').value,
                    video: document.getElementById('video').value,
                };

                const isEditing = !!id;
                const url = isEditing ? `/api/products/${id}` : '/api/products';
                const method = isEditing ? 'PUT' : 'POST';

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': correctPassword
                        },
                        body: JSON.stringify(productData)
                    });

                    const result = await response.json();
                    alert(result.message || result.error);

                    if (response.ok) {
                        resetForm();
                        loadProducts();
                    }
                } catch (error) {
                    console.error('Erreur lors de la soumission du formulaire:', error);
                }
            });
        });
    </script>

</body>
</html>
